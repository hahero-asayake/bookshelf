<!doctype html>
<!-- PNG 書き出し用 一時ページ (T02)。icons/source.svg (案A1) を正確なピクセルサイズで並べ、
     Playwright の element screenshot (scale:'css') で icons/*.png を出力する。
     maskable は夜空ベタ全面 + グロー&シーンを中央 70% に縮小 (円形マスク安全圏)。 -->
<html lang="ja">
<head>
<meta charset="utf-8">
<title>icon-export (T02 一時ファイル)</title>
<style>
  /* 1px ズレ防止: 全タイルを整数座標に絶対配置 */
  body{margin:0;background:#888;font-family:sans-serif;height:1300px}
  .tile{position:absolute;display:block}
  #px512{left:20px;top:20px}
  #mask512{left:560px;top:20px}
  #px192{left:20px;top:560px}
  #apple180{left:240px;top:560px}
  #fav32{left:450px;top:560px}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="bgNight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#181b2c"/>
      <stop offset=".45" stop-color="#2d2638"/>
      <stop offset=".78" stop-color="#4a3b4e"/>
      <stop offset="1" stop-color="#5a4458"/>
    </linearGradient>
    <radialGradient id="glowSunrise" cx=".5" cy=".58" r=".75">
      <stop offset="0" stop-color="#ffecd2"/>
      <stop offset=".5" stop-color="#ff9e7d"/>
      <stop offset="1" stop-color="#ff9e7d" stop-opacity="0"/>
    </radialGradient>
    <g id="sceneExport">
      <g fill="#181b2c">
        <rect x="272" y="176" width="188" height="14" rx="7"/>
        <rect x="272" y="308" width="188" height="14" rx="7"/>
        <rect x="294" y="104" width="26" height="72" rx="6"/>
        <rect x="326" y="98" width="26" height="78" rx="6"/>
        <rect x="394" y="100" width="26" height="76" rx="6"/>
        <rect x="426" y="106" width="26" height="70" rx="6"/>
        <rect x="298" y="238" width="28" height="70" rx="6"/>
        <rect x="334" y="232" width="28" height="76" rx="6"/>
        <rect x="370" y="240" width="28" height="68" rx="6"/>
        <rect x="406" y="234" width="28" height="74" rx="6"/>
        <rect x="346" y="84" width="28" height="80" rx="6" transform="rotate(-22 360 124)"/>
      </g>
      <g stroke="#181b2c" stroke-width="26" stroke-linecap="round" fill="none">
        <path d="M 192 256 L 342 158"/>
        <path d="M 160 268 L 140 342"/>
        <path d="M 158 372 L 148 450"/>
        <path d="M 186 372 L 198 450"/>
      </g>
      <g fill="#181b2c">
        <circle cx="166" cy="190" r="40"/>
        <rect x="134" y="234" width="64" height="142" rx="28"/>
      </g>
    </g>
  </defs>
</svg>

<svg class="tile" id="px512" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="url(#bgNight)"/>
  <rect width="512" height="512" fill="url(#glowSunrise)"/>
  <use href="#sceneExport"/>
</svg>

<!-- maskable: 背景 (夜空+グロー) は全面ベタ、シーンのみ中央 70% (円形マスク安全圏) -->
<svg class="tile" id="mask512" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="url(#bgNight)"/>
  <rect width="512" height="512" fill="url(#glowSunrise)"/>
  <g transform="translate(76.8 76.8) scale(0.7)">
    <use href="#sceneExport"/>
  </g>
</svg>

<svg class="tile" id="px192" width="192" height="192" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="url(#bgNight)"/>
  <rect width="512" height="512" fill="url(#glowSunrise)"/>
  <use href="#sceneExport"/>
</svg>

<svg class="tile" id="apple180" width="180" height="180" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="url(#bgNight)"/>
  <rect width="512" height="512" fill="url(#glowSunrise)"/>
  <use href="#sceneExport"/>
</svg>

<svg class="tile" id="fav32" width="32" height="32" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="url(#bgNight)"/>
  <rect width="512" height="512" fill="url(#glowSunrise)"/>
  <use href="#sceneExport"/>
</svg>
</body>
</html>
