# Asayake Hub Worker の wrangler 設定 (ADR-032 / HUB-SETUP.md)
# oauth-proxy とは別の Worker。`wrangler deploy -c wrangler.hub.toml` でデプロイ。
# <...> を HUB-SETUP.md Phase A で控えた値に置換すること。secret は不要。
# 単一ドメイン・パス分離 (/public/<siteId>/...) なので wildcard サブドメインは不要。

name = "asayake-hub"
main = "asayake-hub.js"
compatibility_date = "2026-01-01"
account_id = "7b1c63e99dcd20999d3d0d5de0183873"   # asayake.org のあるアカウントに固定 (env var のブレ回避)

# --- R2 (sites/ 公開・data/ 私的) ---
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "asayake-hub"

# --- KV (キー/uid/通報) ---
[[kv_namespaces]]
binding = "KV"
id = "d429572547b4434486d44ee0159f46ae"

# --- D1 (Asayake コミュニティ ADR-044: sites/stars/comments/reports/stats) ---
# 未作成の間はこのブロックをコメントのままにする (binding 無し → /community/* は 503、他は正常)。
# 有効化手順 (hahero 手動・着手時): powershell.exe 経由で
#   wrangler d1 create asayake-community          # 出力の database_id を下に貼る
#   下の3行のコメントを外す → wrangler deploy -c wrangler.hub.toml
#   wrangler d1 execute asayake-community --remote --file=community-schema.sql
[[d1_databases]]
binding = "DB"
database_name = "asayake-community"
database_id = "4512f08b-abeb-4a4e-93a0-65fadcee697a"

# --- 環境変数 (いずれも公開値。client secret は持たない) ---
[vars]
HUB_DOMAIN = "hub.asayake.org"                             # ハブの単一ホスト
# CORS 許可 (カンマ区切り)。移行中は github.io と asayake.org を併記
APP_ORIGIN = "https://hahero-asayake.github.io,https://asayake.org"
GOOGLE_CLIENT_ID = "368547907822-r79adn6052laipf20ram49br1skhv7ru.apps.googleusercontent.com"
QUOTA_BYTES = "104857600"                                  # Free プラン上限 = 100MB (ADR-033)。Plus は uid レコードで個別引上げ
OPERATOR_AFFILIATE_TAG = "asayake09-22"                    # ハブ Free 公開ページの Amazon アフィタグ。/go が解決して使う。空にすると無印 (ADR-034追補)

# --- 課金 (Stripe, ADR-035 / Managed Payments ADR-037)。Price ID・版・Plus 上限は公開値なので vars。 ---
# secret (STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET) は wrangler secret put で設定 (toml に書かない)。
# 未設定 (=空/プレースホルダ) の間は課金系エンドポイントが 503 を返し無効化される。
# 商品 (tax_code 付き) と Price 2 本は HUB-SETUP.md Phase E の curl で作成し、その price_… をここへ。
PLUS_QUOTA_BYTES = "3221225472"                            # Plus プラン上限 = 3GB
# 価格は Stripe 商品 AsayakeBookshelf Plus (月$2/年$5)。**本番(live)モードの price ID**。
# ⚠️ STRIPE_SECRET_KEY(sk_live_…) と Webhook(whsec_…) も **同一アカウントの live** のものを使うこと
#    (モード/アカウント不一致だと Checkout が "No such price" で落ちる)。
# 参考: テスト用 price (acct Cd056fwM22, test) = 月 price_1TidClCd056fwM22DkhBceZa / 年 price_1TidClCd056fwM22UZJSRmRf
STRIPE_PRICE_MONTHLY = "price_1TidkaCqEYjXU5jxSG55NUEe"    # 月額 $2 (live)
STRIPE_PRICE_YEARLY = "price_1TidkbCqEYjXU5jxtr1VZzWy"     # 年額 $5 (live)
STRIPE_API_VERSION = "2026-02-25.preview"                  # Managed Payments のプレビュー版 (ADR-037)。Webhook も同版にする

# --- 管理者プラン切替 (ADR-038)。メールは公開 repo に載せたくないので secret にする ---
# wrangler secret put ADMIN_EMAILS  (カンマ区切りの管理者メール。例 "a@example.com,b@example.com")
# 未設定なら誰も管理者にならず /admin/plan は 403。

# --- 書込レート制限 (Class A 書込暴走による課金事故防止, ADR-033) ---
# Bearer キー単位で書込 (PUT/DELETE/batch/publish) を制限。60 秒あたり 60 書込まで。
# unsafe.bindings の ratelimit はネイティブ機能 (KV 書込を消費しない)。
[[unsafe.bindings]]
name = "WRITE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

# --- ルート: hub.asayake.org を Worker 専用ホストに ---
# custom_domain=true なら wrangler が DNS レコードと TLS 証明書も自動作成する
# (手動の A レコード追加は不要)。
[[routes]]
pattern = "hub.asayake.org"
custom_domain = true
